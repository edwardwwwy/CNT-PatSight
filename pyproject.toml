[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
exclude = [
  "^scripts/extraction/build_a_class_batch.*\\.py$",
  "^scripts/extraction/consolidate_a_class_batch\\.py$",
  "^scripts/reporting/",
  "^scripts/regression/",
  "^scripts/nanopub_demo/",
]
